name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks — scan for hardkodede secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4
      - name: Sæt Python op
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Installer afhængigheder
        run: pip install -r requirements.txt
      - name: Kør tests
        env:
          PRICE_PER_KWH: "2.50"
        run: pytest tests/ -v --tb=short

  build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Byg Docker image
        run: docker build -t voltedge-mvp:latest .
      - name: Smoke-test af image
        run: |
          docker run -d --name smoke \
            -e PRICE_PER_KWH=2.50 \
            -e DB_PATH=:memory: \
            -p 8000:8000 \
            voltedge-mvp:latest
          sleep 3
          curl -f http://localhost:8000/health
          docker stop smoke
